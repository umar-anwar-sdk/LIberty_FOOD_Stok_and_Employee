{% extends "base.html" %}
{% block content %}

<div class="card border-0 shadow-lg rounded-4 overflow-hidden">

    <!-- Header -->
    <div class="p-4 text-white"
        style="background: linear-gradient(135deg, #1e3c72, #2a5298); margin-top: 70px;">

        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h2 class="fw-bold mb-1">📦 Add Stock</h2>
                <p class="mb-0 opacity-75">
                    Manage inventory and update stock quantities
                </p>
            </div>


        </div>
    </div>

    <!-- Body -->
    <div class="card-body p-4 bg-light">

        <form method="post">
            {% csrf_token %}

            <div id="stockContainer">

                <div class="stock-group bg-white border-0 shadow-sm rounded-4 p-4 mb-4">

                    <!-- Item -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-dark">
                            Select Item
                        </label>

                        <select name="food_item"
                            class="form-select rounded-3 food-item"
                            onchange="updatePrice(this)">

                            {% for item in items %}
                            <option value="{{ item.id }}"
                                data-price="{{ item.price }}">

                                {{ item.name }} (Current: {{ item.quantity }})

                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Quantity -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-dark">
                            Quantity to Add
                        </label>

                        <input type="number"
                            name="quantity"
                            class="form-control rounded-3 quantity"
                            min="1"
                            required
                            oninput="calculateTotal(this)">
                    </div>

                    <!-- Price -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-dark">
                            Price per Unit
                        </label>

                        <input type="text"
                            class="form-control rounded-3 bg-light unit-price"
                            readonly>
                    </div>

                    <!-- Total -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-dark">
                            Total Price
                        </label>

                        <input type="text"
                            class="form-control rounded-3 bg-light total-price"
                            readonly>
                    </div>

                    <!-- Remove -->
                    <button type="button"
                        class="btn btn-outline-danger rounded-pill px-4"
                        onclick="removeStock(this)">

                        🗑 Remove
                    </button>

                </div>

            </div>

            <!-- Add More -->
            <button type="button"
                class="btn text-white rounded-pill px-4 py-2 mb-4 shadow-sm"
                style="background: linear-gradient(135deg, #1e3c72, #2a5298);"
                onclick="addStock()">

                ➕ Add Another Item
            </button>

            <!-- Bottom Buttons -->
            <div class="d-flex justify-content-between">

                <a href="{% url 'fooditem_list' %}"
                    class="btn btn-secondary rounded-pill px-4">

                    ⬅ Back
                </a>

                <button type="submit"
                    class="btn btn-success rounded-pill px-5 shadow-sm">

                    ✅ Add Stock
                </button>

            </div>

        </form>

    </div>
</div>

<script>
function updatePrice(select) {
    const group = select.closest('.stock-group');
    const price = select.options[select.selectedIndex].dataset.price || 0;

    group.querySelector('.unit-price').value = price;
    calculateTotal(group);
}

function calculateTotal(group) {
    const qty = parseFloat(group.querySelector('.quantity').value) || 0;
    const price = parseFloat(group.querySelector('.unit-price').value) || 0;

    group.querySelector('.total-price').value = (qty * price).toFixed(2);
}

function addStock() {
    const container = document.getElementById('stockContainer');
    const first = container.querySelector('.stock-group');
    const clone = first.cloneNode(true);

    clone.querySelector('.quantity').value = '';
    clone.querySelector('.unit-price').value = '';
    clone.querySelector('.total-price').value = '';

    const select = clone.querySelector('.food-item');
    const qty = clone.querySelector('.quantity');

    select.addEventListener('change', function () {
        updatePrice(this);
    });

    qty.addEventListener('input', function () {
        calculateTotal(clone);
    });

    container.appendChild(clone);
}

function removeStock(button) {
    const container = document.getElementById('stockContainer');

    if (container.children.length > 1) {
        button.closest('.stock-group').remove();
    } else {
        alert("At least one item is required.");
    }
}

document.addEventListener("DOMContentLoaded", function () {

    const firstGroup = document.querySelector('.stock-group');

    const select = firstGroup.querySelector('.food-item');
    const qty = firstGroup.querySelector('.quantity');

    select.addEventListener('change', function () {
        updatePrice(this);
    });

    qty.addEventListener('input', function () {
        calculateTotal(firstGroup);
    });

    updatePrice(select);
});
</script>

{% endblock %}
