{% extends "base.html" %}
{% block content %}
<div class="card shadow p-4">
    <h2 class="mb-4">🛒 Order Detail</h2>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Food Item</th>
                <th>Quantity</th>
                <th>Price (per item)</th>
                <th>Subtotal</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.name }}</td>
                <td>{{ item.quantity }}</td>
                <td>{{ item.price }}</td>
                <td>{{ item.subtotal }}</td>
            </tr>
            {% endfor %}
        </tbody>
        <tfoot class="table-light">
            <tr>
                <th colspan="3" class="text-end">Total</th>
                <th>{{ total }}</th>
            </tr>
        </tfoot>
    </table>

    <div class="mt-3">
        <button onclick="window.print()" class="btn btn-outline-primary">🖨 Print</button>
        <a href="{% url 'order_list' %}" class="btn btn-secondary">🔙 Back to List</a>
    </div>
</div>
{% endblock %}
