{% extends "base.html" %}
{% block content %}

<!-- Premium Header -->
<div class="card border-0 shadow-lg rounded-4 overflow-hidden mb-4">

    <div class="p-4 text-white"
        style="background: linear-gradient(135deg, #1e3c72, #2a5298); margin-top: 70px;">

        <div class="d-flex justify-content-between align-items-center flex-wrap">

            <div>
                <h2 class="fw-bold mb-1">
                    📝 Edit Order
                </h2>

                <p class="mb-0 opacity-75">
                    Update customer, items and quantity details
                </p>
            </div>

        </div>

    </div>
</div>

<!-- Form Card -->
<div class="card border-0 shadow-lg rounded-4">

    <div class="card-body p-4">

        <form method="post">
            {% csrf_token %}

            <input type="hidden" name="order_id" value="{{ order.id }}">

            <!-- Customer -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Customer</label>
                <select name="customer" class="form-select rounded-3 shadow-sm" required>
                    <option value="">-- Select Customer --</option>
                    {% for c in customers %}
                        <option value="{{ c.id }}"
                            {% if c.id == order.customer.id %}selected{% endif %}>
                            {{ c.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Food Item -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Food Item</label>
                <select name="food_item" class="form-select rounded-3 shadow-sm" required>
                    <option value="">-- Select Food Item --</option>
                    {% for f in food_items %}
                        <option value="{{ f.id }}"
                            {% if f.id == order.food_item.id %}selected{% endif %}>
                            {{ f.name }} (Rs. {{ f.price }})
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Quantity -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Quantity</label>
                <input type="number"
                    name="quantity"
                    value="{{ order.quantity }}"
                    min="1"
                    class="form-control rounded-3 shadow-sm"
                    required>
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between">

                <a href="{% url 'order_list' %}"
                    class="btn btn-outline-secondary rounded-pill px-4">

                    ⬅ Back
                </a>

                <button type="submit"
                    class="btn btn-success rounded-pill px-4 shadow-sm">

                    ✅ Update Order
                </button>

            </div>

        </form>

    </div>
</div>

{% endblock %}
