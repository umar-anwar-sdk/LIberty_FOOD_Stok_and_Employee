{% extends "base.html" %}
{% block content %}
<!-- Premium Header -->
<div class="card border-0 shadow-lg rounded-4 overflow-hidden mb-4">

    <div class="p-4 text-white"
        style="background: linear-gradient(135deg, #1e3c72, #2a5298); ">

        <div class="d-flex justify-content-between align-items-center flex-wrap">

            <div>
                <h2 class="fw-bold mb-1">
                    Dealers List
                </h2>

                <p class="mb-0 opacity-75">
                    Manage Your All Dealers Here
                </p>
            </div>
            <a href="{% url 'add_dealer' %}" class="btn btn-success" > Add New Dealer</a>



        </div>

    </div>
</div>

<div class="container">

    <div class="card shadow">

        <div class="card-body">

            
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Address</th>
                        <th>Actions</th> 
                    </tr>
                </thead>
                <tbody>
                    {% for dealer in dealers %}
                    <tr>
                        <td>{{ dealer.name }}</td>
                        <td>{{ dealer.phone }}</td>
                        <td>{{ dealer.address }}</td>
                        <td>
            <a href="{% url 'delete_dealer' dealer.id %}" 
               class="btn btn-danger btn-sm"
               onclick="return confirm('Are you sure you want to delete this dealer?');">
               Delete
            </a>
        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center">No dealers found.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>
    </div>

</div>

{% endblock %}
