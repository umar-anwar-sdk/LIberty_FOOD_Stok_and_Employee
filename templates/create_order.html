{% extends "base.html" %}
{% block content %}

<!-- Premium Header -->
<div class="card border-0 shadow-lg rounded-4 overflow-hidden">

    <div class="p-4 text-white"
        style="background: linear-gradient(135deg, #1e3c72, #2a5298); ">

        <div class="d-flex justify-content-between align-items-center flex-wrap">

            <div>
                <h2 class="fw-bold mb-1">
                    🛒 Create New Order
                </h2>

                <p class="mb-0 opacity-75">
                    Add customer and select multiple food items
                </p>
            </div>

        </div>

    </div>
</div>
<div class="container mt-4">

    <div class="row g-4">

        <!-- MAIN FORM -->
        <div class="col-12">

            <div class="card border-0 shadow-sm rounded-4 p-4">

                <form method="post" id="orderForm">
                    {% csrf_token %}

                    <!-- CUSTOMER -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Customer</label>
                        <select name="customer" class="form-select form-select-lg rounded-3" required>
                            <option value="">Select Customer</option>
                            {% for c in customers %}
                                <option value="{{ c.id }}">{{ c.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <hr class="opacity-25">

                    <!-- HEADER ROW -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold mb-0">🍽 Order Items</h5>

                        <button type="button"
                                class="btn btn-primary btn-sm rounded-3 px-3"
                                onclick="addProduct()">
                            ➕ Add Item
                        </button>
                    </div>

                    <!-- ITEMS -->
                    <div id="productContainer">

                        <div class="product-group border rounded-4 p-3 mb-3 bg-light">

                            <div class="d-flex justify-content-between mb-2">
                                <small class="text-muted fw-semibold">Item #1</small>
                            </div>

                            <select name="food_item[]"
                                    class="form-select food-item rounded-3 mb-3"
                                    onchange="updatePrice(this)" required>

                                <option value="">Select Food Item</option>

                                {% for f in food_items %}
                                    <option value="{{ f.id }}"
                                            data-price="{{ f.price }}"
                                            data-stock="{{ f.quantity }}">
                                        {{ f.name }} • Stock {{ f.quantity }}
                                    </option>
                                {% endfor %}

                            </select>

                            <div class="row g-3">

                                <div class="col-md-4">
                                    <label class="form-label text-muted">Qty</label>
                                    <input type="number"
                                           name="quantity[]"
                                           class="form-control quantity rounded-3"
                                           min="1"
                                           value="1"
                                           oninput="calculateTotal(this)"
                                           required>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label text-muted">Price</label>
                                    <input type="text"
                                           class="form-control unit-price bg-white rounded-3"
                                           readonly>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label text-muted">Total</label>
                                    <input type="text"
                                           class="form-control total-price bg-white fw-bold text-success rounded-3"
                                           readonly>
                                </div>

                            </div>

                            <div class="text-end mt-3">
                                <button type="button"
                                        class="btn btn-outline-danger btn-sm rounded-3"
                                        onclick="removeProduct(this)">
                                    Remove
                                </button>
                            </div>

                        </div>

                    </div>

                    <!-- ACTIONS -->
                    <div class="d-flex justify-content-between mt-4">

                        <a href="{% url 'order_list' %}"
                           class="btn btn-outline-secondary rounded-3 px-4">
                            ⬅ Back
                        </a>

                        <button type="submit"
                                class="btn btn-success rounded-3 px-4">
                            ✅ Place Order
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<script>

    function updatePrice(select) {

        const group = select.closest('.product-group');

        const price = select.options[select.selectedIndex]
            ?.getAttribute('data-price') || '';

        group.querySelector('.unit-price').value = price;

        calculateTotal(select);

    }

    function calculateTotal(element) {

        const group = element.closest('.product-group');

        const qty = parseFloat(group.querySelector('.quantity').value) || 0;

        const price = parseFloat(group.querySelector('.unit-price').value) || 0;

        group.querySelector('.total-price').value = (qty * price).toFixed(2);

    }

    function addProduct() {
    const container = document.getElementById('productContainer');

    const first = container.children[0];
    const newGroup = first.cloneNode(true);

    // reset values properly
    newGroup.querySelectorAll('input, select').forEach(el => {
        if (el.tagName === "SELECT") {
            el.selectedIndex = 0;
        } else {
            el.value = "";
        }
    });

    container.appendChild(newGroup);
}
    function removeProduct(button) {

        const container = document.getElementById('productContainer');

        if (container.children.length > 1) {
            button.closest('.product-group').remove();
        } else {
            alert("At least one product is required.");
        }

    }

</script>

{% endblock %}
