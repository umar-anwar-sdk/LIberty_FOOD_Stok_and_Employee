{% extends "base.html" %}
{% load static %}

{% block content %}
  <div class="main-panel">
    <div class="content-wrapper">
      <div class="page-header">
        <h3 class="page-title">Add Customer</h3>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'customer_list' %}">Customers</a></li>
            <li class="breadcrumb-item active" aria-current="page">Add Customer</li>
          </ol>
        </nav>
      </div>

      <div class="row">
        <div class="col-md-12 grid-margin stretch-card">
          <div class="card">
            <div class="card-body">
              <h4 class="card-title">Customer Information</h4>
              <p class="card-description">Fill in the details below</p>

              <form method="post" class="forms-sample">
                {% csrf_token %}
                <div class="form-group">
                  <label for="name">Name</label>
                  <input type="text" name="name" class="form-control" id="name" placeholder="Enter customer name"
                    required>
                </div>

                <div class="form-group">
                  <label for="address">Address</label>
                  <textarea name="address" class="form-control" id="address" rows="3"
                    placeholder="Enter address"></textarea>
                </div>

                <div class="form-group">
                  <label for="phone">Phone</label>
                  <input type="text" name="phone" class="form-control" id="phone" placeholder="Enter phone number"
                    required>
                </div>

                <button type="submit" class="btn btn-primary mr-2">Save</button>
                <a href="{% url 'customer_add' %}" class="btn btn-light">Cancel</a>
              </form>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

{% endblock %}
