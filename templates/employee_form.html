{% extends "base.html" %}
{% load static %}

{% block content %}

<!-- Premium Header -->
<div class="card border-0 shadow-lg rounded-4 overflow-hidden">

  <div class="p-4 text-white" style="background: linear-gradient(135deg, #1e3c72, #2a5298);">

    <div class="d-flex justify-content-between align-items-center flex-wrap">

      <div>
        <h2 class="fw-bold mb-1">
          👨‍💼 Add Employee
        </h2>

        <p class="mb-0 opacity-75">
          Create new employee profile with complete details
        </p>
      </div>


    </div>

  </div>
</div>

<div class="main-panel" style="width: 100%; margin-top: 20px;">
  <div class="row">
    <div class="col-12 grid-margin stretch-card">

      <div class="card border-0 shadow-lg rounded-4">

        <div class="card-body p-4">
          <p class="text-muted mb-4">
            Fill in the details below
          </p>

          <form method="post" class="forms-sample">
            {% csrf_token %}

            <div class="row">

              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">First Name</label>
                <input type="text" name="first_name" class="form-control rounded-3 shadow-sm"
                  placeholder="Enter first name" required>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Last Name</label>
                <input type="text" name="last_name" class="form-control rounded-3 shadow-sm"
                  placeholder="Enter last name" required>
              </div>

            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Position</label>
              <input type="text" name="position" class="form-control rounded-3 shadow-sm" placeholder="Enter position"
                required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Join Date & Time</label>
              <input type="datetime-local" name="join_date" class="form-control rounded-3 shadow-sm" required>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Salary</label>
              <input type="number" step="0.01" name="salary" class="form-control rounded-3 shadow-sm"
                placeholder="Enter salary" required>
            </div>

            <div class="d-flex justify-content-between">

              <a href="{% url 'employee_list' %}" class="btn btn-outline-secondary rounded-pill px-4">
                Cancel
              </a>

              <button type="submit" class="btn btn-primary rounded-pill px-5 shadow-sm">
                💾 Save Employee
              </button>

            </div>

          </form>

        </div>

      </div>

    </div>
  </div>
</div>

{% endblock %}
