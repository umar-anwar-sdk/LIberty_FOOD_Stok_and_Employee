{% extends "base.html" %}
{% load static %}

{% block content %}

<!-- Premium Header -->
<div class="card border-0 shadow-lg rounded-4 overflow-hidden">

    <div class="p-4 text-white"
        style="background: linear-gradient(135deg, #1e3c72, #2a5298);">

        <div class="d-flex justify-content-between align-items-center flex-wrap">

            <div>
                <h2 class="fw-bold mb-1">
                    🍔 {% if item %}Edit{% else %}Add{% endif %} Food Item
                </h2>

                <p class="mb-0 opacity-75">
                    Manage product details, pricing, category and inventory
                </p>
            </div>
            <div class="d-flex justify-content-end gap-2 ">

              <a href="{% url 'add_category' %}"
                 class="btn btn-light btn-sm rounded-pill px-3">
                ➕ Category
              </a>

              <a href="{% url 'add_dealer' %}"
                 class="btn btn-light btn-sm rounded-pill px-3">
                ➕ Dealer
              </a>

            </div>
        </div>

    </div>
</div>

<div class="main-panel" style="margin-top: 20px;">
  <div class="content-wrapper">

    <div class="row">
      <div class="col-12">

        <div class="card border-0 shadow-lg rounded-4">

          <div class="card-body p-4">

            <form method="post" enctype="multipart/form-data">
              {% csrf_token %}

              <!-- Basic Info -->
              <div class="p-3 bg-light rounded-4 mb-4">

                <h5 class="fw-bold mb-3">📦 Basic Information</h5>

                <div class="mb-3">
                  <label class="form-label">Name</label>
                  <input type="text" name="name"
                         value="{{ item.name|default:'' }}"
                         class="form-control rounded-3"
                         placeholder="Enter food item name"
                         required>
                </div>

                <div class="mb-3">
                  <label class="form-label">Description</label>
                  <textarea name="description"
                            class="form-control rounded-3"
                            rows="3"
                            placeholder="Enter description">{{ item.description|default:'' }}</textarea>
                </div>

                <div class="row">

                  <div class="col-md-6 mb-3">
                    <label class="form-label">Price</label>
                    <input type="number" step="0.01"
                           name="price"
                           value="{{ item.price|default:'' }}"
                           class="form-control rounded-3"
                           placeholder="Enter price"
                           required>
                  </div>

                  <div class="col-md-6 mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select rounded-3" required>
                      {% for cat in categories %}
                        <option value="{{ cat.id }}"
                          {% if item.category.id == cat.id %}selected{% endif %}>
                          {{ cat.name }}
                        </option>
                      {% endfor %}
                    </select>
                  </div>

                </div>

                <div class="mb-3">
                  <label class="form-label">Dealer</label>
                  <select name="dealer" class="form-select rounded-3">
                    <option value="">-- Select Dealer --</option>
                    {% for d in dealers %}
                      <option value="{{ d.id }}"
                        {% if item.dealer.id == d.id %}selected{% endif %}>
                        {{ d.name }}
                      </option>
                    {% endfor %}
                  </select>
                </div>

              </div>

              <!-- Image -->
              <div class="p-3 bg-light rounded-4 mb-4">

                <h5 class="fw-bold mb-3">🖼 Image</h5>

                <input type="file" name="image" class="form-control rounded-3">

                {% if item.image %}
                <div class="mt-3 text-center">
                  <img src="{{ item.image.url }}"
                       class="rounded-4 shadow-sm"
                       style="max-width:200px;height:200px;object-fit:cover;">
                </div>
                {% endif %}

              </div>

              <!-- Buttons -->
              <div class="d-flex justify-content-end gap-2">

                <a href="{% url 'fooditem_list' %}"
                   class="btn btn-outline-secondary rounded-pill px-4">
                  Cancel
                </a>

                <button type="submit"
                        class="btn btn-success rounded-pill px-5 shadow-sm">
                  💾 Save
                </button>

              </div>

            </form>

          </div>

        </div>

      </div>
    </div>

  </div>
</div>

{% endblock %}
