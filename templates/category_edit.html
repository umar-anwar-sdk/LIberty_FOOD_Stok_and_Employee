{% extends "base.html" %}
{% block content %}

<div class="col-12 shadow p-4">
    <h2 class="mt-5"> Edit Category</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label for="name" class="form-label"><b>Category Name</b></label>
            <input type="text" id="name" name="name" value="{{ category.name }}" class="form-control" required>
        </div>
        <div class="d-flex justify-content-between">
            <a href="{% url 'category_list' %}" class="btn btn-secondary">⬅ Back</a>
            <button type="submit" class="btn btn-success">💾 Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
